version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sehra_db
      POSTGRES_USER: sehra
      POSTGRES_PASSWORD: sehra_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sehra -d sehra_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  sehra-analyzer:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sehra:sehra_pass@db:5432/sehra_db
      APP_URL: http://localhost:8501
      PORT: "8501"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
